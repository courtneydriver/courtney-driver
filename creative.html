    <script>
    (function () {
        function initCreativeMobileFilter() {
            var portfolio = document.querySelector('.Portfolio');
            if (!portfolio) {
                return false;
            }

            var nav = portfolio.querySelector('.Portfolio__nav');
            if (!nav) {
                return false;
            }

            var listItems = nav.querySelectorAll('li');
            if (!listItems.length) {
                return false;
            }

            var existing = portfolio.querySelector('.Portfolio__mobile-filter');
            if (existing) {
                return true;
            }

            var select = document.createElement('select');
            select.className = 'Portfolio__mobile-filter';
            select.setAttribute('aria-label', 'Filter projects');

            Array.prototype.forEach.call(listItems, function (item, index) {
                var option = document.createElement('option');
                var label = (item.textContent || '').trim();
                option.value = String(index);
                option.textContent = label;
                if (item.classList.contains('active')) {
                    option.selected = true;
                }
                select.appendChild(option);
            });

            select.addEventListener('change', function () {
                var selectedItem = listItems[parseInt(select.value, 10)];
                if (selectedItem) {
                    selectedItem.click();
                }
            });

            nav.parentNode.insertBefore(select, nav.nextSibling);

            nav.addEventListener('click', function () {
                setTimeout(function () {
                    var active = nav.querySelector('li.active');
                    if (!active) {
                        return;
                    }
                    var activeIndex = Array.prototype.indexOf.call(listItems, active);
                    if (activeIndex > -1) {
                        select.value = String(activeIndex);
                    }
                }, 350);
            });

            return true;
        }

        document.addEventListener('DOMContentLoaded', function () {
            var tries = 0;
            var timer = setInterval(function () {
                tries += 1;
                if (initCreativeMobileFilter() || tries > 30) {
                    clearInterval(timer);
                }
            }, 150);
        });
    })();
    </script>
